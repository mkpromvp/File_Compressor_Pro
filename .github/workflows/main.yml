name: 💀 Smart Downloader AI + Auto Extract + GoFile

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "📦 Mode"
        required: true
        default: "game"
        type: choice
        options:
          - game
          - rom

      urls:
        description: "🔗 URLs (ANY type - direct or page)"
        required: true
        type: string

      output_name:
        description: "📁 Output Name"
        required: true
        default: "MK_PRO_OUTPUT"
        type: string

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: ⚙️ Install tools
        run: |
          sudo apt update
          sudo apt install -y aria2 curl jq unzip zip p7zip-full unrar python3 python3-pip
          pip install requests bs4

      - name: 🧠 Smart Link Extractor
        run: |
          mkdir files
          cd files

          echo "${{ github.event.inputs.urls }}" > raw_links.txt

          echo "🔍 Extracting real links..."

          python3 << 'EOF'
          import requests
          from bs4 import BeautifulSoup

          final_links = []

          with open("raw_links.txt") as f:
              links = [l.strip() for l in f if l.strip()]

          for url in links:
              print(f"Checking: {url}")

              try:
                  r = requests.get(url, timeout=10)
                  content_type = r.headers.get("content-type","")

                  # لو direct
                  if "application" in content_type or ".zip" in url or ".rar" in url:
                      final_links.append(url)
                      continue

                  # MediaFire extractor
                  soup = BeautifulSoup(r.text, "html.parser")
                  btn = soup.find("a", {"id":"downloadButton"})

                  if btn:
                      final_links.append(btn.get("href"))
                      continue

                  # generic extractor
                  for a in soup.find_all("a"):
                      href = a.get("href")
                      if href and any(ext in href for ext in [".zip",".rar",".7z",".iso"]):
                          final_links.append(href)

              except Exception as e:
                  print("Error:", e)

          with open("direct_links.txt","w") as f:
              for l in final_links:
                  f.write(l+"\n")

          print("Final links:")
          for l in final_links:
              print(l)
          EOF

      - name: 📥 Download
        run: |
          cd files
          aria2c -x16 -s16 -j5 -i direct_links.txt

      - name: 🧩 Extract & Merge
        run: |
          cd files

          echo "🔍 Processing archives..."

          # RAR split
          if ls *.part1.rar 1> /dev/null 2>&1; then
            unrar x *.part1.rar
          fi

          # RAR single
          if ls *.rar 1> /dev/null 2>&1; then
            unrar x *.rar
          fi

          # ZIP split
          if ls *.zip.001 1> /dev/null 2>&1; then
            7z x *.zip.001
          fi

          # ZIP single
          if ls *.zip 1> /dev/null 2>&1; then
            unzip -o "*.zip"
          fi

          # 7z
          if ls *.7z 1> /dev/null 2>&1; then
            7z x *.7z
          fi

      - name: ⚙️ Mode Handler
        run: |
          mkdir output
          cp -r files/* output/ 2>/dev/null || true

          if [ "${{ github.event.inputs.mode }}" == "rom" ]; then
            echo "📱 Cleaning ROM..."
            rm -rf output/*.img 2>/dev/null || true
            rm -rf output/payload.bin 2>/dev/null || true
          fi

      - name: 🗜️ Compress
        run: |
          cd output
          zip -r9 "../${{ github.event.inputs.output_name }}.zip" .

      - name: ☁️ Upload GoFile
        run: |
          FILE="${{ github.event.inputs.output_name }}.zip"

          echo "📤 Uploading..."

          RESPONSE=$(curl -s -F "file=@$FILE" https://store1.gofile.io/uploadFile)

          echo "$RESPONSE"

          LINK=$(echo "$RESPONSE" | jq -r '.data.downloadPage // empty')

          if [ -z "$LINK" ]; then
            echo "❌ Upload failed"
            exit 1
          fi

          echo "🔗 $LINK"
          echo "LINK=$LINK" >> $GITHUB_ENV

      - name: ✅ Done
        run: echo "🔥 DONE: $LINK"
