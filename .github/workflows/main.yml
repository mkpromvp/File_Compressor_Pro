name: 🚀 Smart Downloader + Merger + Compressor + GoFile Upload

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "📦 Choose Mode"
        required: true
        default: "game"
        type: choice
        options:
          - game
          - rom

      urls:
        description: "🔗 Direct URLs (one per line)"
        required: true
        type: string

      output_name:
        description: "📁 Output Name (without extension)"
        required: true
        default: "MK_Output"
        type: string

jobs:
  process:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Install Tools
        run: |
          sudo apt update
          sudo apt install -y aria2 zip unzip p7zip-full curl jq

      - name: 📥 Download Files
        run: |
          mkdir files
          cd files

          echo "${{ github.event.inputs.urls }}" > links.txt

          aria2c -x16 -s16 -j5 -i links.txt

      - name: 🧠 Detect & Merge Parts
        run: |
          cd files

          echo "🔍 Checking for split files..."

          # rar parts
          if ls *.part1.rar 1> /dev/null 2>&1; then
            echo "🧩 RAR split detected"
            unrar x *.part1.rar
          fi

          # zip parts
          if ls *.zip.001 1> /dev/null 2>&1; then
            echo "🧩 ZIP split detected"
            7z x *.zip.001
          fi

          # file_01.zip style
          if ls *01.zip 1> /dev/null 2>&1; then
            echo "🧩 Numbered ZIP detected"
            cat *.zip > merged.zip
            unzip merged.zip
          fi

      - name: ⚙️ Process Mode
        run: |
          mkdir output

          if [ "${{ github.event.inputs.mode }}" == "game" ]; then
            echo "🎮 Game Mode Activated"
            mv files/* output/ 2>/dev/null || true
          else
            echo "📱 ROM Mode Activated"
            mv files/* output/ 2>/dev/null || true

            # تنظيف الرومات
            rm -rf output/*.img 2>/dev/null || true
            rm -rf output/payload.bin 2>/dev/null || true
          fi

      - name: 🗜️ Compress Output
        run: |
          cd output
          zip -r9 "../${{ github.event.inputs.output_name }}.zip" .

      - name: ☁️ Upload to GoFile
        run: |
          FILE="${{ github.event.inputs.output_name }}.zip"

          echo "📤 Uploading to GoFile..."

          SERVER=$(curl -s https://api.gofile.io/getServer | jq -r '.data.server')

          RESPONSE=$(curl -s -F "file=@$FILE" https://$SERVER.gofile.io/uploadFile)

          LINK=$(echo $RESPONSE | jq -r '.data.downloadPage')

          echo "🔗 Download Link: $LINK"
          echo "LINK=$LINK" >> $GITHUB_ENV

      - name: 📢 Show Result
        run: |
          echo "✅ Done!"
          echo "🔗 $LINK"
