name: Smart Downloader AI + Auto Extract + GoFile

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Mode"
        required: true
        default: game
        type: choice
        options:
          - game
          - rom
      urls:
        description: "URLs (one per line)"
        required: true
        type: string
      output_name:
        description: "Output zip name"
        required: true
        default: MK_PRO_OUTPUT
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Install tools
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends aria2 curl jq unzip zip p7zip-full unrar python3 python3-pip
          python3 -m pip install --quiet requests beautifulsoup4 lxml

      - name: Extract direct links
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p files
          cd files

          printf '%s\n' "${{ github.event.inputs.urls }}" > raw_links.txt
          sed -i '/^[[:space:]]*$/d' raw_links.txt
          sed -i 's/^[[:space:]]*//;s/[[:space:]]*$//' raw_links.txt

          cp ../scripts/extractor.py ./extractor.py
          python3 ./extractor.py

      - name: Download files
        shell: bash
        run: |
          set -euo pipefail
          cd files
          if [[ ! -s direct_links.txt ]]; then
            echo "direct_links.txt is empty"
            exit 1
          fi

          aria2c \
            --max-connection-per-server=16 \
            --split=16 \
            --max-concurrent-downloads=5 \
            --continue=true \
            --retry-wait=5 \
            --max-tries=5 \
            --file-allocation=none \
            --summary-interval=20 \
            --console-log-level=warn \
            -i direct_links.txt

      - name: Extract archives
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          cd files

          if compgen -G "*.part1.rar" > /dev/null || compgen -G "*.part01.rar" > /dev/null; then
            for f in *.part1.rar *.part01.rar; do
              unrar x -y "$f"
            done
          elif compgen -G "*.rar" > /dev/null; then
            for f in *.rar; do
              unrar x -y "$f"
            done
          fi

          if compgen -G "*.zip.001" > /dev/null; then
            for f in *.zip.001; do
              7z x "$f" -y
            done
          elif compgen -G "*.zip" > /dev/null; then
            for f in *.zip; do
              unzip -o "$f" -d "${f%.zip}_extracted"
            done
          fi

          if compgen -G "*.7z" > /dev/null; then
            for f in *.7z; do
              7z x "$f" -y
            done
          fi

          if compgen -G "*.7z.001" > /dev/null; then
            for f in *.7z.001; do
              7z x "$f" -y
            done
          fi

          if compgen -G "*.iso" > /dev/null; then
            for f in *.iso; do
              7z x "$f" -y
            done
          fi

          if compgen -G "*.tar.gz" > /dev/null; then
            for f in *.tar.gz; do
              tar -xzf "$f"
            done
          fi

          if compgen -G "*.tgz" > /dev/null; then
            for f in *.tgz; do
              tar -xzf "$f"
            done
          fi

          if compgen -G "*.tar.xz" > /dev/null; then
            for f in *.tar.xz; do
              tar -xJf "$f"
            done
          fi

          if compgen -G "*.tar.bz2" > /dev/null; then
            for f in *.tar.bz2; do
              tar -xjf "$f"
            done
          fi

      - name: Prepare output
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p output
          cp -R files/. output/

          if [[ "${{ github.event.inputs.mode }}" == "rom" ]]; then
            find output -maxdepth 1 \( -name "*.img" -o -name "payload.bin" -o -name "care_map.pb" \) -delete
          fi

      - name: Compress output
        shell: bash
        run: |
          set -euo pipefail
          archive="${{ github.event.inputs.output_name }}.zip"
          (cd output && zip -r9 "../${archive}" .)

          if [[ ! -f "$archive" ]]; then
            echo "Archive not created"
            exit 1
          fi

          size=$(du -h "$archive" | awk '{print $1}')
          echo "ARCHIVE_NAME=$archive" >> "$GITHUB_ENV"
          echo "ARCHIVE_SIZE=$size" >> "$GITHUB_ENV"

      - name: Upload to GoFile
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${ARCHIVE_NAME:-}" || ! -f "$ARCHIVE_NAME" ]]; then
            echo "Archive file missing"
            exit 1
          fi

          server=$(curl -s https://api.gofile.io/servers | jq -r '.data.servers[0].name // "store1"')
          response=$(curl -s -F "file=@${ARCHIVE_NAME}" "https://${server}.gofile.io/uploadFile")
          status=$(echo "$response" | jq -r '.status // "error"')

          if [[ "$status" != "ok" ]]; then
            echo "Upload failed"
            echo "$response"
            exit 1
          fi

          link=$(echo "$response" | jq -r '.data.downloadPage // empty')
          code=$(echo "$response" | jq -r '.data.code // empty')

          if [[ -z "$link" ]]; then
            echo "Download link missing"
            echo "$response"
            exit 1
          fi

          echo "GOFILE_LINK=$link" >> "$GITHUB_ENV"
          echo "GOFILE_CODE=$code" >> "$GITHUB_ENV"

          {
            echo "## Smart Downloader Result"
            echo ""
            echo "- Output: ${ARCHIVE_NAME}"
            echo "- Size: ${ARCHIVE_SIZE:-unknown}"
            echo "- Server: ${server}"
            echo "- Download: ${link}"
            echo "- Code: ${code}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Done
        shell: bash
        run: |
          set -euo pipefail
          echo "Workflow finished"
          echo "Output: ${ARCHIVE_NAME:-unknown}"
          echo "GoFile: ${GOFILE_LINK:-not-available}"
