name: WORKING DOWNLOADER

on:
workflow_dispatch:
inputs:
url:
description: "Download URL"
required: true
name:
description: "Output Name"
required: true
default: "output"

jobs:
build:
runs-on: ubuntu-latest

steps:
  - name: Install tools
    run: |
      sudo apt update
      sudo apt install -y aria2 zip unzip

  - name: Download file
    run: |
      mkdir files
      cd files
      aria2c "${{ github.event.inputs.url }}"

  - name: Compress
    run: |
      zip -r "${{ github.event.inputs.name }}.zip" files

  - name: Upload
    run: |
      curl -F "file=@${{ github.event.inputs.name }}.zip" https://store1.gofile.io/uploadFile
